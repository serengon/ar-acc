name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          cd api && uv sync --dev
          cd ../etl && uv sync --dev
          cd ../frontend && npm ci

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          allowed_tools: |
            Bash(cd api && uv run ruff check src/ tests/)
            Bash(cd etl && uv run ruff check src/ tests/)
            Bash(cd frontend && npm run lint)
            Bash(cd api && uv run mypy src/)
            Bash(cd etl && uv run mypy src/)
            Bash(cd frontend && npm run type-check)
            Bash(cd api && uv run pytest *)
            Bash(cd etl && uv run pytest *)
            Bash(cd frontend && npx vitest run *)
            Bash(gh pr view *)
            Bash(gh pr diff *)
            Bash(gh pr checks *)

