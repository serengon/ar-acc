name: Release Label Policy

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled, ready_for_review]
    branches: [main]

jobs:
  check_release_label:
    name: Check Release Label
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const allowed = new Set([
              "release:major",
              "release:feature",
              "release:patterns",
              "release:api",
              "release:data",
              "release:privacy",
              "release:fix",
              "release:docs",
              "release:infra",
              "release:security",
            ]);

            const labels = (context.payload.pull_request.labels || []).map((l) => l.name);
            const releaseLabels = labels.filter((l) => allowed.has(l));

            if (releaseLabels.length !== 1) {
              core.setFailed(
                [
                  "PR must have exactly one release label.",
                  `Found: ${releaseLabels.length}`,
                  `Current release labels: ${releaseLabels.join(", ") || "none"}`,
                ].join("\n"),
              );
            }
